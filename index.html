<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THC LLM — Tec Haze Circuit</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d0d0d;
      color: #ececec;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 16px 24px;
      background: #111;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #00e5a0;
    }

    header span {
      font-size: 12px;
      color: #555;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .msg {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .msg.user {
      background: #00e5a0;
      color: #0d0d0d;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .msg.assistant {
      background: #1a1a1a;
      color: #ececec;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      border: 1px solid #2a2a2a;
    }

    .msg.thinking {
      background: #1a1a1a;
      color: #555;
      align-self: flex-start;
      border: 1px solid #2a2a2a;
      font-style: italic;
    }

    #input-area {
      padding: 16px 24px;
      background: #111;
      border-top: 1px solid #222;
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    #input-area textarea {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      color: #ececec;
      padding: 12px 16px;
      font-size: 14px;
      resize: none;
      outline: none;
      max-height: 120px;
      line-height: 1.5;
    }

    #input-area textarea:focus {
      border-color: #00e5a0;
    }

    #input-area button {
      background: #00e5a0;
      color: #0d0d0d;
      border: none;
      border-radius: 12px;
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      white-space: nowrap;
    }

    #input-area button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    #input-area button:hover:not(:disabled) {
      opacity: 0.85;
    }

    .welcome {
      text-align: center;
      color: #333;
      margin: auto;
    }

    .welcome h2 { font-size: 32px; color: #00e5a0; margin-bottom: 8px; }
    .welcome p  { font-size: 14px; }
  </style>
</head>
<body>

<header>
  <h1>🤖 THC LLM</h1>
  <span>Tec Haze Circuit — Gemma 3 1B</span>
</header>

<div id="chat">
  <div class="welcome">
    <h2>THC LLM</h2>
    <p>Assistente da Tec Haze Circuit. Faça sua pergunta abaixo.</p>
  </div>
</div>

<div id="input-area">
  <textarea id="msg" rows="1" placeholder="Digite sua mensagem... (Enter para enviar)"></textarea>
  <button id="send-btn" onclick="sendMessage()">Enviar</button>
</div>

<script>
  const chat = document.getElementById('chat');
  const msgInput = document.getElementById('msg');
  const sendBtn = document.getElementById('send-btn');

  // Histórico de mensagens
  const history = [];

  // Enter envia, Shift+Enter quebra linha
  msgInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // Auto-resize textarea
  msgInput.addEventListener('input', () => {
    msgInput.style.height = 'auto';
    msgInput.style.height = msgInput.scrollHeight + 'px';
  });

  function addMessage(role, content) {
    const welcome = chat.querySelector('.welcome');
    if (welcome) welcome.remove();

    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.textContent = content;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  async function sendMessage() {
    const text = msgInput.value.trim();
    if (!text || sendBtn.disabled) return;

    // Mostra mensagem do usuário
    addMessage('user', text);
    history.push({ role: 'user', content: text });

    // Limpa input
    msgInput.value = '';
    msgInput.style.height = 'auto';
    sendBtn.disabled = true;

    // Mostra "pensando..."
    const thinking = addMessage('thinking', '⏳ Pensando...');

    try {
      const res = await fetch('/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          messages: history,
          max_tokens: 512,
          temperature: 0.7
        })
      });

      const data = await res.json();

      if (!res.ok) {
        thinking.className = 'msg assistant';
        thinking.textContent = '❌ Erro: ' + (data.detail || 'Erro desconhecido');
        return;
      }

      const reply = data.choices[0].message.content;
      history.push({ role: 'assistant', content: reply });

      thinking.className = 'msg assistant';
      thinking.textContent = reply;

    } catch (err) {
      thinking.className = 'msg assistant';
      thinking.textContent = '❌ Erro de conexão: ' + err.message;
    } finally {
      sendBtn.disabled = false;
      msgInput.focus();
    }
  }
</script>

</body>
</html>
